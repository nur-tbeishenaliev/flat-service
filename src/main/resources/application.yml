server:
  port: 8080
  servlet:
    context-path: /flat-service

spring:
  application:
    name: flat-service

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  liquibase:
    enabled: true
    change-log: classpath:migration/db.changelog-master.yaml